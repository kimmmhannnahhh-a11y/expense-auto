<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>법카 영수증 자동등록</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
         background: #0f1116; color: #e8eaed; padding: 16px; max-width: 520px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 4px 0 16px; }
  .card { background: #1a1d24; border: 1px solid #2a2e37; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: #9aa0aa; margin: 12px 0 6px; }
  input, select { width: 100%; padding: 13px; font-size: 16px; background: #0f1116; color: #e8eaed;
                  border: 1px solid #2a2e37; border-radius: 10px; }
  button { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; border: 0; border-radius: 12px;
           background: #3b82f6; color: #fff; margin-top: 14px; }
  button.ghost { background: #2a2e37; color: #e8eaed; }
  button:disabled { opacity: .5; }
  .photo-box { border: 2px dashed #2a2e37; border-radius: 12px; padding: 28px 16px; text-align: center; color: #9aa0aa; }
  #preview { max-width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
  .hint { font-size: 12px; color: #6b7280; margin-top: 8px; }
  .status { font-size: 13px; padding: 10px 12px; border-radius: 10px; margin-bottom: 14px; }
  .ok { background: #14321f; color: #6ee7a8; }
  .warn { background: #3a2a14; color: #f5c463; }
  .spin { display:inline-block; width:16px; height:16px; border:2px solid #fff; border-top-color:transparent;
          border-radius:50%; animation: r 0.7s linear infinite; vertical-align:-3px; margin-right:6px; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <h1>법카 영수증 자동등록</h1>
  <div id="status" class="status warn">상태 확인 중...</div>

  <div class="card">
    <label>영수증 사진</label>
    <div class="photo-box" id="photoBox">사진 찍기 / 앨범에서 선택</div>
    <input id="file" type="file" accept="image/*" capture="environment" style="display:none" />
    <img id="preview" />
    <button id="analyzeBtn" disabled>AI로 자동 분석</button>
    <div class="hint">사진을 올리면 금액·날짜·가게·항목·제목을 자동으로 읽어요.</div>
  </div>

  <div class="card" id="result" style="display:none">
    <label>지출항목</label>
    <select id="category"></select>
    <label>제목</label>
    <input id="title" />
    <label>금액 (원)</label>
    <input id="amount" inputmode="numeric" />
    <label>날짜</label>
    <input id="date" type="date" />
    <label>가게/상호</label>
    <input id="vendor" />
    <button id="submitBtn">다우오피스에 등록</button>
    <button class="ghost" id="resetBtn">다시 하기</button>
  </div>

<script>
const $ = s => document.querySelector(s);
let categories = [];

async function loadStatus() {
  try {
    const r = await fetch("/api/status").then(r => r.json());
    categories = r.categories || [];
    fillCategories();
    if (r.ocr && r.daou) setStatus("ok", "준비 완료 — 사진 분석 + 자동등록 가능");
    else if (r.ocr) setStatus("warn", "사진 분석 가능 / 자동등록은 준비중(2단계)");
    else setStatus("warn", "서버에 API 키 설정 필요 (ANTHROPIC_API_KEY)");
  } catch { setStatus("warn", "서버 연결 실패"); }
}
function setStatus(cls, msg) { const s = $("#status"); s.className = "status " + cls; s.textContent = msg; }
function fillCategories() {
  $("#category").innerHTML = categories.map(c => `<option>${c}</option>`).join("");
}

$("#photoBox").onclick = () => $("#file").click();
$("#file").onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const url = URL.createObjectURL(f);
  $("#preview").src = url; $("#preview").style.display = "block";
  $("#photoBox").textContent = "사진 선택됨 (다시 누르면 변경)";
  $("#analyzeBtn").disabled = false;
};

$("#analyzeBtn").onclick = async () => {
  const f = $("#file").files[0]; if (!f) return;
  const btn = $("#analyzeBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>분석 중...';
  try {
    const fd = new FormData(); fd.append("photo", f);
    const r = await fetch("/api/ocr", { method: "POST", body: fd }).then(r => r.json());
    if (r.error) throw new Error(r.error);
    const d = r.data;
    if (r.categories) { categories = r.categories; fillCategories(); }
    $("#category").value = d.category || categories[0];
    $("#title").value = d.title || "";
    $("#amount").value = d.amount || "";
    $("#date").value = (d.date && /^\d{4}-\d{2}-\d{2}$/.test(d.date)) ? d.date : "";
    $("#vendor").value = d.vendor || "";
    $("#result").style.display = "block";
    $("#result").scrollIntoView({ behavior: "smooth" });
  } catch (e) { alert(e.message); }
  finally { btn.disabled = false; btn.textContent = "AI로 자동 분석"; }
};

$("#submitBtn").onclick = async () => {
  const f = $("#file").files[0];
  const btn = $("#submitBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>등록 중...';
  try {
    const fd = new FormData();
    fd.append("photo", f);
    ["category","title","amount","date","vendor"].forEach(k => fd.append(k, $("#"+k).value));
    const r = await fetch("/api/submit", { method: "POST", body: fd }).then(r => r.json());
    if (r.error) throw new Error(r.error);
    alert("다우오피스 등록 완료!");
    $("#resetBtn").click();
  } catch (e) { alert(e.message); }
  finally { btn.disabled = false; btn.textContent = "다우오피스에 등록"; }
};

$("#resetBtn").onclick = () => {
  $("#file").value = ""; $("#preview").style.display = "none";
  $("#photoBox").textContent = "사진 찍기 / 앨범에서 선택";
  $("#analyzeBtn").disabled = true; $("#result").style.display = "none";
};

loadStatus();
</script>
</body>
</html>
